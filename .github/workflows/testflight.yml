name: TestFlight upload

# Builds the iOS app with Xcode 26 (Apple Silicon runner — the 2018 Intel Mac at
# home can't run it) and uploads to TestFlight via the App Store Connect API key.
# Trigger manually from the Actions tab, or push a change under ios/.

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths: ["ios/**"]

concurrency:
  group: testflight
  cancel-in-progress: false

jobs:
  upload:
    runs-on: macos-26
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Select newest Xcode 26
        run: |
          XCODE=$(ls -d /Applications/Xcode_26*.app 2>/dev/null | sort -V | tail -1)
          echo "Using $XCODE"
          sudo xcode-select -s "$XCODE/Contents/Developer"
          xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate project
        working-directory: ios
        run: xcodegen generate

      - name: Write App Store Connect API key
        run: |
          mkdir -p ~/private_keys
          echo "${{ secrets.ASC_KEY_P8 }}" | base64 -d > ~/private_keys/AuthKey_${{ secrets.ASC_KEY_ID }}.p8

      - name: Archive
        working-directory: ios
        run: |
          xcodebuild -project FamilyHub.xcodeproj -scheme FamilyHub \
            -destination 'generic/platform=iOS' \
            -archivePath build/FamilyHub.xcarchive \
            CURRENT_PROJECT_VERSION=${{ github.run_number }} \
            -allowProvisioningUpdates \
            -authenticationKeyPath ~/private_keys/AuthKey_${{ secrets.ASC_KEY_ID }}.p8 \
            -authenticationKeyID ${{ secrets.ASC_KEY_ID }} \
            -authenticationKeyIssuerID ${{ secrets.ASC_ISSUER_ID }} \
            archive

      - name: Upload to TestFlight
        working-directory: ios
        run: |
          xcodebuild -exportArchive \
            -archivePath build/FamilyHub.xcarchive \
            -exportOptionsPlist exportOptions.plist \
            -allowProvisioningUpdates \
            -authenticationKeyPath ~/private_keys/AuthKey_${{ secrets.ASC_KEY_ID }}.p8 \
            -authenticationKeyID ${{ secrets.ASC_KEY_ID }} \
            -authenticationKeyIssuerID ${{ secrets.ASC_ISSUER_ID }}
