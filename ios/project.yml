name: FamilyHub
options:
  bundleIdPrefix: com.blanke
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "5.10"
    TARGETED_DEVICE_FAMILY: "1,2"
    GENERATE_INFOPLIST_FILE: false
    DEVELOPMENT_TEAM: GWB7DQCGVD
    CODE_SIGN_STYLE: Automatic
targets:
  FamilyHub:
    type: application
    platform: iOS
    sources:
      - path: FamilyHub
    info:
      path: FamilyHub/Info.plist
      properties:
        CFBundleDisplayName: Home Board
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        UILaunchScreen:
          UIColorName: LaunchBackground
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~iphone:
          - UIInterfaceOrientationPortrait
        NSCameraUsageDescription: Used to photograph a pharmacy label so the medication form can be pre-filled. Photos are reviewed by you before anything is saved.
        NSPhotoLibraryUsageDescription: Lets you choose an existing photo of a pharmacy label to pre-fill the medication form.
        # Server lives on the Tailscale tailnet over plain HTTP (no public exposure).
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: false
          NSExceptionDomains:
            tail8d54ec.ts.net:
              NSExceptionAllowsInsecureHTTPLoads: true
              NSIncludesSubdomains: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.blanke.homeboard
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: "1.0"
        ENABLE_PREVIEWS: true
  FamilyHubTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: FamilyHubTests
    settings:
      base:
        GENERATE_INFOPLIST_FILE: true
    dependencies:
      - target: FamilyHub
  FamilyHubUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: FamilyHubUITests
    settings:
      base:
        GENERATE_INFOPLIST_FILE: true
    dependencies:
      - target: FamilyHub
schemes:
  FamilyHub:
    build:
      targets:
        FamilyHub: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - FamilyHubTests
        - FamilyHubUITests
