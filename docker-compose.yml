services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${TAILSCALE_BIND:-127.0.0.1}:8080:8000"
    # Lets the optional med-scan reach a host-published service (e.g. an llm-router
    # on the host's :4000) via http://host.docker.internal:<port>. Harmless if unused.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - medphotos:/data/med-photos

  mcp:
    build:
      context: .
      dockerfile: mcpserver/Dockerfile
    restart: unless-stopped
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${TAILSCALE_BIND:-127.0.0.1}:8765:8765"

volumes:
  pgdata:
  medphotos:
